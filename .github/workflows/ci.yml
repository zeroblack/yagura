name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: go tool staticcheck ./...
      - name: govulncheck
        run: go tool govulncheck ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...
